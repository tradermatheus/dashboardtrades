<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #030712;
      overflow-x: hidden;
    }

    .glass {
      background: rgba(17, 24, 39, 0.85);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
    }

    .calendar-day:hover .trash {
      opacity: 1;
    }
  </style>
</head>
<body class="text-white min-h-screen p-6">
  <div class="max-w-7xl mx-auto">
    <h1 class="text-5xl font-black text-center mb-10 tracking-wide">
      TRADING DASHBOARD
    </h1>

    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-5 mb-8">
      <div class="glass rounded-[30px] p-6">
        <p class="text-zinc-400 mb-3">Saldo Atual</p>
        <h2 id="liveBalance" class="text-4xl font-black text-green-400">R$ 1000</h2>
        <div class="mt-4">
          <p class="text-zinc-500 text-sm">Saldo Inicial</p>
          <input id="initialBalance" type="number" value="1000"
            class="bg-transparent outline-none text-xl mt-1 font-bold w-full" />
        </div>
      </div>

      <div class="glass rounded-[30px] p-6">
        <p class="text-zinc-400 mb-3">Winrate</p>
        <h2 id="winrate" class="text-4xl font-black text-green-400">0%</h2>
      </div>

      <div class="glass rounded-[30px] p-6">
        <p class="text-zinc-400 mb-3">Lucro Mensal</p>
        <h2 id="monthlyProfit" class="text-4xl font-black">R$ 0</h2>
      </div>

      <div class="glass rounded-[30px] p-6">
        <p class="text-zinc-400 mb-3">Mês</p>

        <select id="monthSelect"
          class="w-full bg-[#111827] border border-white/10 rounded-2xl p-4 outline-none">
        </select>
      </div>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-[1fr_360px] gap-6">
      <div class="glass rounded-[35px] p-6">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-3xl font-black">Calendário</h2>
          <p class="text-zinc-400">2026</p>
        </div>

        <div class="grid grid-cols-7 gap-3 mb-3 text-center text-zinc-500 font-bold">
          <div>DOM</div>
          <div>SEG</div>
          <div>TER</div>
          <div>QUA</div>
          <div>QUI</div>
          <div>SEX</div>
          <div>SAB</div>
        </div>

        <div id="calendar" class="grid grid-cols-7 gap-3"></div>
      </div>

      <div class="glass rounded-[35px] p-6">
        <h2 class="text-3xl font-black mb-6">Detalhes</h2>

        <div id="details" class="text-zinc-500 text-center py-20">
          Clique em um dia
        </div>
      </div>
    </div>
  </div>

  <div id="modal"
    class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-6">

    <div class="glass w-full max-w-xl rounded-[35px] p-6">
      <div class="flex justify-between items-center mb-6">
        <h2 id="modalTitle" class="text-3xl font-black"></h2>

        <button onclick="closeModal()"
          class="text-zinc-400 hover:text-white text-3xl">
          ×
        </button>
      </div>

      <div class="space-y-4">
        <div class="bg-[#111827] rounded-2xl p-4 border border-white/10">
          Par: XAUUSD
        </div>

        <select id="tradeType"
          class="w-full bg-[#111827] border border-white/10 rounded-2xl p-4 outline-none">
          <option>COMPRA</option>
          <option>VENDA</option>
        </select>

        <input id="tradeAmount"
          type="number"
          placeholder="Quanto ganhou/perdeu"
          class="w-full bg-[#111827] border border-white/10 rounded-2xl p-4 outline-none" />

        <input id="tradeChannel"
          placeholder="Tamanho do canal"
          class="w-full bg-[#111827] border border-white/10 rounded-2xl p-4 outline-none" />

        <select id="tradeTake"
          class="w-full bg-[#111827] border border-white/10 rounded-2xl p-4 outline-none">
          <option>1 Nivel</option>
          <option>2 Niveis</option>
        </select>

        <select id="tradeReverse"
          class="w-full bg-[#111827] border border-white/10 rounded-2xl p-4 outline-none">
          <option>Nao</option>
          <option>Sim</option>
        </select>

        <textarea id="tradeNotes"
          placeholder="Notas do dia"
          class="w-full h-32 resize-none bg-[#111827] border border-white/10 rounded-2xl p-4 outline-none"></textarea>

        <input id="tradeImage" type="file" accept="image/*"
          class="w-full bg-[#111827] border border-white/10 rounded-2xl p-4 outline-none" />

        <button onclick="saveTrade()"
          class="w-full py-4 rounded-2xl bg-green-500 text-black font-black hover:opacity-90 transition">
          Salvar Trade
        </button>
      </div>
    </div>
  </div>

  <script>
    const months = [
      'Janeiro','Fevereiro','Março','Abril','Maio','Junho',
      'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'
    ];

    const trades = {};

    let selectedMonth = 0;
    let activeDay = null;

    const monthSelect = document.getElementById('monthSelect');

    months.forEach((m, i) => {
      monthSelect.innerHTML += `<option value="${i}">${m} 2026</option>`;
    });

    monthSelect.addEventListener('change', (e) => {
      selectedMonth = Number(e.target.value);
      renderCalendar();
      updateStats();
    });

    function getKey(day) {
      return `${selectedMonth}-${day}`;
    }

    function openModal(day) {
      activeDay = day;
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modalTitle').innerText = `Adicionar Trade - Dia ${day}`;
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function saveTrade() {
      const amount = Number(document.getElementById('tradeAmount').value || 0);
      const channel = document.getElementById('tradeChannel').value;
      const take = document.getElementById('tradeTake').value;
      const reverse = document.getElementById('tradeReverse').value;
      const notes = document.getElementById('tradeNotes').value;
      const imageFile = document.getElementById('tradeImage').files[0];
      const type = document.getElementById('tradeType').value;

      const reader = new FileReader();

      reader.onload = function () {
        trades[getKey(activeDay)] = {
          amount,
          channel,
          take,
          reverse,
          notes,
          image: reader.result,
          type,
          day: activeDay
        };

        closeModal();
        renderCalendar();
        updateStats();
      }

      if (imageFile) {
        reader.readAsDataURL(imageFile);
      } else {
        trades[getKey(activeDay)] = {
          amount,
          channel,
          take,
          reverse,
          notes,
          image: null,
          type,
          day: activeDay
        };

        closeModal();
        renderCalendar();
        updateStats();
      }
    }

    function removeTrade(day) {
      delete trades[getKey(day)];
      renderCalendar();
      updateStats();

      document.getElementById('details').innerHTML = `
        <div class="text-zinc-500 text-center py-20">
          Clique em um dia
        </div>
      `;
    }

    function showDetails(day) {
      const trade = trades[getKey(day)];

      if (!trade) return;

      document.getElementById('details').innerHTML = `
        <h2 class="text-3xl font-black mb-5">Dia ${day}</h2>

        <div class="bg-black/20 border border-white/10 rounded-3xl p-5 mb-5">
          <p class="text-zinc-400 mb-2">Notas</p>
          <div class="whitespace-pre-wrap">${trade.notes || 'Sem notas'}</div>

          ${trade.image ? `
            <img src="${trade.image}"
              onclick="openFullscreenImage('${trade.image}')"
              class="mt-5 rounded-3xl border border-white/10 cursor-zoom-in hover:opacity-90 transition" />
          ` : ''}
        </div>

        <div class="bg-black/20 border border-white/10 rounded-3xl p-5">
          <div class="flex justify-between mb-4">
            <h3 class="font-black text-xl">XAUUSD</h3>

            <span class="${trade.amount >= 0 ? 'text-green-400':'text-red-400'} font-black">
              R$ ${trade.amount}
            </span>
          </div>

          <div class="space-y-2 text-zinc-300">
            <p>Tipo: ${trade.type}</p>
            <p>Canal: ${trade.channel}</p>
            <p>Take: ${trade.take}</p>
            <p>Virou mão: ${trade.reverse}</p>
          </div>
        </div>
      `;
    }

    function openFullscreenImage(src) {
      const overlay = document.createElement('div');

      overlay.className = 'fixed inset-0 bg-black/95 flex items-center justify-center p-6';

      overlay.innerHTML = `
        <button
          onclick="this.parentElement.remove()"
          class="absolute top-6 right-6 text-white text-5xl hover:opacity-70 transition"
        >
          ×
        </button>

        <img
          src="${src}"
          class="max-w-full max-h-full rounded-3xl border border-white/10 shadow-2xl"
        />
      `;

      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) {
          overlay.remove();
        }
      });

      document.body.appendChild(overlay);
    }

    function updateStats() {
      const monthTrades = Object.keys(trades)
        .filter(k => Number(k.split('-')[0]) === selectedMonth)
        .map(k => trades[k]);

      const total = monthTrades.reduce((a,b) => a + b.amount, 0);

      const initial = Number(document.getElementById('initialBalance').value || 0);

      document.getElementById('liveBalance').innerText =
        `R$ ${(initial + total).toFixed(2)}`;

      document.getElementById('monthlyProfit').innerText =
        `R$ ${total.toFixed(2)}`;

      const wins = monthTrades.filter(t => t.amount > 0).length;
      const losses = monthTrades.filter(t => t.amount < 0).length;

      const wr = ((wins / ((wins + losses) || 1)) * 100).toFixed(1);

      document.getElementById('winrate').innerText = `${wr}%`;
    }

    document.getElementById('initialBalance').addEventListener('input', updateStats);

    function renderCalendar() {
      const calendar = document.getElementById('calendar');
      calendar.innerHTML = '';

      const firstDay = new Date(2026, selectedMonth, 1).getDay();
      const totalDays = new Date(2026, selectedMonth + 1, 0).getDate();

      for (let i = 0; i < firstDay; i++) {
        calendar.innerHTML += '<div></div>';
      }

      for (let day = 1; day <= totalDays; day++) {
        const trade = trades[getKey(day)];

        const bg = !trade
          ? 'bg-[#111827] border-white/10'
          : trade.amount >= 0
            ? 'bg-green-500/10 border-green-500/30'
            : 'bg-red-500/10 border-red-500/30';

        calendar.innerHTML += `
          <div onclick="showDetails(${day})"
            class="calendar-day relative h-36 rounded-3xl border ${bg} p-4 cursor-pointer transition hover:scale-[1.02]">

            <div class="flex items-center justify-between mb-5">
              <span class="font-black text-lg">${day}</span>

              <button onclick="event.stopPropagation(); openModal(${day})"
                class="w-8 h-8 rounded-xl bg-white/10 hover:bg-green-500 hover:text-black transition">
                +
              </button>
            </div>

            ${trade ? `
              <div class="text-xl font-black ${trade.amount >= 0 ? 'text-green-400':'text-red-400'}">
                R$ ${trade.amount}
                ${trade.reverse === 'Sim' ? '<span class="text-yellow-400 ml-2">V</span>' : ''}
              </div>

              <button onclick="event.stopPropagation(); removeTrade(${day})"
                class="trash absolute bottom-3 right-3 opacity-0 transition bg-red-500/20 hover:bg-red-500 w-8 h-8 rounded-xl text-red-400 hover:text-white">
                🗑
              </button>
            ` : ''}
          </div>
        `;
      }
    }

    renderCalendar();
    updateStats();
  </script>
</body>
</html>
